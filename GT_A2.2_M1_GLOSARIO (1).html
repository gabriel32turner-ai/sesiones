<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary A2.2 · M1 — Gabriel Turner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#3730A3;--dark:#1A2E45;--bg:#F7F5F0;--white:#fff;--gray:#7A8A9A;--light:#EDE8DD}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{max-width:960px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.htitle{flex:1;min-width:0}
.htitle h1{font-size:14px;font-weight:700;color:#fff}
.htitle p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.controls{max-width:960px;margin:0 auto;padding:16px 16px 0}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:11px 40px 11px 14px;border:2px solid var(--light);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--dark);outline:none;transition:border .2s;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--acc)}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.filter-btn{padding:6px 13px;border-radius:20px;border:2px solid var(--light);background:var(--white);color:var(--gray);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.stats{font-size:12px;color:var(--gray);padding:8px 0 14px}
.stats strong{color:var(--dark)}
.grid{max-width:960px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--light);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.98)}
.card-img{width:100%;height:110px;object-fit:cover;display:block;background:#EDE8DD}
.card-img-placeholder{width:100%;height:110px;background:linear-gradient(135deg,var(--dark) 0%,#2d4a6b 100%);display:none;align-items:center;justify-content:center;font-size:32px}
.card-body{padding:14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.word{font-size:18px;font-weight:700;color:var(--dark);line-height:1.2}
.type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:3px;flex-shrink:0}
.type-noun{background:#EBF3FF;color:#1A56A0}
.type-verb{background:#F0EBFC;color:#5B3FA0}
.type-phrase{background:#FEF8EE;color:#B85C0A}
.type-adj{background:#E3F5EC;color:#1A6B3C}
.spanish{font-size:13px;color:var(--gray);font-style:italic;margin-bottom:10px}
.session-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:8px;display:block}
.example-wrap{display:none;background:#F7F5F0;border-radius:8px;padding:10px 12px;margin-top:8px}
.example-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:4px}
.example{font-size:12px;color:var(--dark);line-height:1.6;font-style:italic}
.card.open .example-wrap{display:block}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.speak-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1.5px solid var(--light);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent}
.speak-btn.playing{background:var(--acc);border-color:var(--acc);color:#fff}
.flip-hint{font-size:10px;color:var(--gray)}
.card.open .flip-hint{color:var(--acc)}
.no-results{max-width:960px;margin:40px auto;padding:0 16px;text-align:center;color:var(--gray)}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 30px}
  .word{font-size:16px}
  .card-img,.card-img-placeholder{height:90px}
  .card-body{padding:10px}
  .speak-btn{padding:4px 9px;font-size:11px}
  .controls{padding:12px 12px 0}
  .filter-btn{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">GT</div>
    <div class="htitle">
      <h1>Glossary · A2.2 — M1</h1>
      <p>Work Environment & Personality · Entorno laboral y personalidad</p>
    </div>
    <span class="badge" id="badge-count">37 words</span>
  </div>
</div>
<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search in English or Spanish..." oninput="filterCards()" autocomplete="off" autocorrect="off" spellcheck="false">
    <span class="search-icon">🔍</span>
  </div>
  <div class="filters"><button class="filter-btn active" onclick="setFilter('all',this)">All</button><button class="filter-btn" onclick="setFilter('S1',this)">S1</button><button class="filter-btn" onclick="setFilter('S2',this)">S2</button><button class="filter-btn" onclick="setFilter('S3',this)">S3</button><button class="filter-btn" onclick="setFilter('S4',this)">S4</button><button class="filter-btn" onclick="setFilter('S5',this)">S5</button></div>
  <div class="stats"><strong id="count">37</strong> words · Tap a card to see an example sentence</div>
</div>
<div class="grid" id="grid"></div>
<div class="no-results" id="noResults" style="display:none"><p>No results found 🔍</p></div>
<script>
const WORDS=[
  {w:'culture',es:'cultura (laboral)',ex:'Our company has a very collaborative culture.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=400&auto=format&fit=crop',e:'🏢'},
  {w:'environment',es:'ambiente / entorno',ex:'I prefer a relaxed and creative work environment.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'🌿'},
  {w:'hybrid',es:'híbrido (trabajo mixto)',ex:'We\'ve already moved to a hybrid work model.',s:'S1',t:'adj',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'🏠💻'},
  {w:'benefits',es:'beneficios (laborales)',ex:'Our benefits include health insurance and flexible hours.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'🎁'},
  {w:'policy',es:'política (empresarial)',ex:'HR has just updated the remote work policy.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'📋'},
  {w:'I\'ve already',es:'Ya he / Ya + verbo',ex:'I\'ve already finished the report. No need to worry!',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1531545514256-b1400bc00f31?w=400&auto=format&fit=crop',e:'✅'},
  {w:'Have you ... yet?',es:'¿Ya has…? / ¿Ya lo has hecho?',ex:'Have you met the new manager yet?',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=400&auto=format&fit=crop',e:'❓'},
  {w:'I haven\'t ... yet',es:'Todavía no he…',ex:'I haven\'t received the contract yet.',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'⏳'},
  {w:'She\'s just',es:'Ella acaba de…',ex:'She\'s just joined the team. Welcome her!',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'⚡'},
  {w:'introduce',es:'introducir / presentar (algo nuevo)',ex:'They\'ve just introduced a new wellness program.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🆕'},
  {w:'I\'ve worked here for',es:'He trabajado aquí por (tiempo)',ex:'I\'ve worked here for four years. Still here!',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'📅'},
  {w:'I joined in',es:'Me uní en (año específico)',ex:'I joined the company in 2020. That was a tough year.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'📌'},
  {w:'Have you ever',es:'¿Alguna vez has…?',ex:'Have you ever worked in an international company?',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&auto=format&fit=crop',e:'🌍'},
  {w:'I\'ve never',es:'Nunca he…',ex:'I\'ve never had a job with full health insurance.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1590650046871-92c887180603?w=400&auto=format&fit=crop',e:'🚫'},
  {w:'achievement',es:'logro / éxito profesional',ex:'My biggest achievement has been building this team.',s:'S2',t:'noun',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🏆'},
  {w:'experience',es:'experiencia',ex:'I\'ve had a lot of international work experience.',s:'S2',t:'noun',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'💼'},
  {w:'background',es:'trayectoria profesional',ex:'Can you tell me about your professional background?',s:'S2',t:'noun',img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&auto=format&fit=crop',e:'📖'},
  {w:'role',es:'puesto / rol',ex:'I\'ve been in this role for two years now.',s:'S2',t:'noun',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'👤'},
  {w:'outgoing',es:'extrovertido/a',ex:'I\'m quite outgoing — I love meeting new clients.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=400&auto=format&fit=crop',e:'😊'},
  {w:'reliable',es:'confiable / de confianza',ex:'People say I\'m reliable — I always deliver on time.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🤝'},
  {w:'ambitious',es:'ambicioso/a',ex:'She\'s very ambitious — always looking for the next step.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'🚀'},
  {w:'collaborative',es:'colaborativo/a',ex:'He\'s very collaborative — always shares credit.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=400&auto=format&fit=crop',e:'👥'},
  {w:'calm',es:'tranquilo/a / calmado/a',ex:'She stays calm even in the most stressful situations.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'😌'},
  {w:'tend to',es:'soler / tender a',ex:'I tend to arrive early. I don\'t like to rush.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'🔄'},
  {w:'I come across as',es:'Doy la impresión de ser',ex:'People say I come across as very confident.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&auto=format&fit=crop',e:'🪞'},
  {w:'I\'m known for',es:'Soy conocido/a por',ex:'I\'m known for being reliable and organized.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'⭐'},
  {w:'flexible hours',es:'horario flexible',ex:'The company offers flexible hours — I start at 8 or 10.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'🕐'},
  {w:'health insurance',es:'seguro médico',ex:'The benefits include full health insurance.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&auto=format&fit=crop',e:'🏥'},
  {w:'wellness program',es:'programa de bienestar',ex:'Our wellness program includes a gym allowance.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&auto=format&fit=crop',e:'💪'},
  {w:'I\'m really into',es:'Me encanta / Soy muy aficionado/a a',ex:'I\'m really into photography in my free time.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'❤'},
  {w:'I\'ve been passionate about',es:'Siempre me ha apasionado',ex:'I\'ve been passionate about cooking since I was a child.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🔥'},
  {w:'I\'ve recently started',es:'Recientemente empecé a',ex:'I\'ve recently started running in the mornings.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&auto=format&fit=crop',e:'🆕'},
  {w:'for / since',es:'por (duración) / desde (punto de inicio)',ex:'I\'ve worked here for 3 years / since 2021.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'📅'},
  {w:'organized',es:'organizado/a',ex:'I\'m very organized — I keep lists for everything.',s:'S5',t:'adj',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'📋'},
  {w:'direct',es:'directo/a',ex:'I tend to be direct — I say what I think, but fairly.',s:'S5',t:'adj',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'➡'},
  {w:'progress',es:'progreso / avance',ex:'We\'ve made a lot of progress this quarter. Great team!',s:'S5',t:'noun',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'📈'},
  {w:'ideal work environment',es:'ambiente laboral ideal',ex:'My ideal work environment is collaborative and flexible.',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'🌟'},
];
const typeLabels={noun:'Sust.',verb:'Verb.',phrase:'Frase',adj:'Adj.'};
const typeClasses={noun:'type-noun',verb:'type-verb',phrase:'type-phrase',adj:'type-adj'};
let filter='all',search='';
function buildCard(item,idx){
  return `<div class="card" id="c${idx}" data-s="${item.s}" data-w="${item.w.toLowerCase()}" data-es="${item.es.toLowerCase()}" onclick="toggle(${idx})">
    ${item.img?`<img class="card-img" src="${item.img}" alt="${item.w}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
    <div class="card-img-placeholder" style="display:${item.img?'none':'flex'}">${item.e||'📚'}</div>
    <div class="card-body">
      <span class="session-tag">${item.s} · A2.2 M1</span>
      <div class="card-top">
        <div class="word">${item.w}</div>
        <span class="type-badge ${typeClasses[item.t]}">${typeLabels[item.t]}</span>
      </div>
      <div class="spanish">(${item.es})</div>
      <div class="card-footer">
        <button class="speak-btn" id="sp${idx}" onclick="event.stopPropagation();speak(this.dataset.w,{idx})" data-w="${item.w}">🔊 Listen</button>
        <span class="flip-hint" id="hint${idx}">see example ▾</span>
      </div>
      <div class="example-wrap">
        <div class="example-label">Example</div>
        <div class="example">${item.ex}</div>
      </div>
    </div>
  </div>`;
}
function render(){
  const q=search.toLowerCase();
  const filtered=WORDS.filter(w=>{
    const ms=filter==='all'||w.s===filter;
    const mq=!q||w.w.toLowerCase().includes(q)||w.es.toLowerCase().includes(q);
    return ms&&mq;
  });
  document.getElementById('count').textContent=filtered.length;
  document.getElementById('noResults').style.display=filtered.length?'none':'block';
  document.getElementById('grid').innerHTML=filtered.map(w=>buildCard(w,WORDS.indexOf(w))).join('');
}
function toggle(idx){
  const c=document.getElementById('c'+idx);
  const h=document.getElementById('hint'+idx);
  if(!c)return;
  const open=c.classList.toggle('open');
  if(h)h.textContent=open?'close ▴':'see example ▾';
}
function spk(idx){
  const item=WORDS[idx];
  if(!item||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(item.w);
  u.lang='en-US';u.rate=0.82;
  const b=document.getElementById('sp'+idx);
  if(b){b.classList.add('playing');b.textContent='🔊 ...';}
  u.onend=()=>{if(b){b.classList.remove('playing');b.textContent='🔊 Listen';}};
  window.speechSynthesis.speak(u);
}
function speak(w,idx){spk(idx);}
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterCards(){
  search=document.getElementById('search').value;
  render();
}
render();
</script>
</body>
</html>
