<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary A2.1 · M1 — Gabriel Turner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#6B21A8;--dark:#1A2E45;--bg:#F7F5F0;--white:#fff;--gray:#7A8A9A;--light:#EDE8DD}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{max-width:960px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.htitle{flex:1;min-width:0}
.htitle h1{font-size:14px;font-weight:700;color:#fff}
.htitle p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.controls{max-width:960px;margin:0 auto;padding:16px 16px 0}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:11px 40px 11px 14px;border:2px solid var(--light);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--dark);outline:none;transition:border .2s;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--acc)}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.filter-btn{padding:6px 13px;border-radius:20px;border:2px solid var(--light);background:var(--white);color:var(--gray);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.stats{font-size:12px;color:var(--gray);padding:8px 0 14px}
.stats strong{color:var(--dark)}
.grid{max-width:960px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--light);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.98)}
.card-img{width:100%;height:110px;object-fit:cover;display:block;background:#EDE8DD}
.card-img-placeholder{width:100%;height:110px;background:linear-gradient(135deg,var(--dark) 0%,#2d4a6b 100%);display:none;align-items:center;justify-content:center;font-size:32px}
.card-body{padding:14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.word{font-size:18px;font-weight:700;color:var(--dark);line-height:1.2}
.type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:3px;flex-shrink:0}
.type-noun{background:#EBF3FF;color:#1A56A0}
.type-verb{background:#F0EBFC;color:#5B3FA0}
.type-phrase{background:#FEF8EE;color:#B85C0A}
.type-adj{background:#E3F5EC;color:#1A6B3C}
.spanish{font-size:13px;color:var(--gray);font-style:italic;margin-bottom:10px}
.session-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:8px;display:block}
.example-wrap{display:none;background:#F7F5F0;border-radius:8px;padding:10px 12px;margin-top:8px}
.example-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:4px}
.example{font-size:12px;color:var(--dark);line-height:1.6;font-style:italic}
.card.open .example-wrap{display:block}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.speak-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1.5px solid var(--light);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent}
.speak-btn.playing{background:var(--acc);border-color:var(--acc);color:#fff}
.flip-hint{font-size:10px;color:var(--gray)}
.card.open .flip-hint{color:var(--acc)}
.no-results{max-width:960px;margin:40px auto;padding:0 16px;text-align:center;color:var(--gray)}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 30px}
  .word{font-size:16px}
  .card-img,.card-img-placeholder{height:90px}
  .card-body{padding:10px}
  .speak-btn{padding:4px 9px;font-size:11px}
  .controls{padding:12px 12px 0}
  .filter-btn{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">GT</div>
    <div class="htitle">
      <h1>Glossary · A2.1 — M1</h1>
      <p>In the Meeting Room · Reuniones y participación activa</p>
    </div>
    <span class="badge" id="badge-count">31 words</span>
  </div>
</div>
<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search in English or Spanish..." oninput="filterCards()" autocomplete="off" autocorrect="off" spellcheck="false">
    <span class="search-icon">🔍</span>
  </div>
  <div class="filters"><button class="filter-btn active" onclick="setFilter('all',this)">All</button><button class="filter-btn" onclick="setFilter('S1',this)">S1</button><button class="filter-btn" onclick="setFilter('S2',this)">S2</button><button class="filter-btn" onclick="setFilter('S3',this)">S3</button><button class="filter-btn" onclick="setFilter('S4',this)">S4</button><button class="filter-btn" onclick="setFilter('S5',this)">S5</button></div>
  <div class="stats"><strong id="count">31</strong> words · Tap a card to see an example sentence</div>
</div>
<div class="grid" id="grid"></div>
<div class="no-results" id="noResults" style="display:none"><p>No results found 🔍</p></div>
<script>
const WORDS=[
  {w:'agenda',es:'agenda (de reunión)',ex:'Did everyone receive the agenda for today?',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'📋'},
  {w:'action point',es:'punto de acción / tarea asignada',ex:'I have three action points from this meeting.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'✅'},
  {w:'follow up',es:'dar seguimiento',ex:'I\'m going to follow up with the client tomorrow.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'🔄'},
  {w:'outcome',es:'resultado / conclusión',ex:'The main outcome of the meeting was a new timeline.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🎯'},
  {w:'reschedule',es:'reprogramar',ex:'We\'re going to reschedule — the CEO is unavailable.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'📅'},
  {w:'postpone',es:'posponer / aplazar',ex:'They decided to postpone the launch to next quarter.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1590650046871-92c887180603?w=400&auto=format&fit=crop',e:'⏳'},
  {w:'wrap up',es:'cerrar / concluir (una reunión)',ex:'Let\'s wrap up — it\'s already 3pm!',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'🏁'},
  {w:'We\'re going to',es:'Vamos a / Nos disponemos a',ex:'We\'re going to reschedule the meeting for Friday.',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&auto=format&fit=crop',e:'🔮'},
  {w:'I\'m going to',es:'Voy a',ex:'I\'m going to call the supplier this afternoon.',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'🚀'},
  {w:'next steps',es:'próximos pasos',ex:'Let\'s confirm the next steps before we close.',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'👣'},
  {w:'I\'ll take care of that',es:'Yo me encargo de eso',ex:'I\'ll take care of that action item — don\'t worry.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'💪'},
  {w:'I\'ll get back to you',es:'Te respondo / Te confirmo',ex:'I\'ll get back to you on that — let me check.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&auto=format&fit=crop',e:'🔙'},
  {w:'I\'ll let you know',es:'Te aviso / Te informo',ex:'I\'ll let you know as soon as I hear back.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1604580864964-0462f5d5b1a8?w=400&auto=format&fit=crop',e:'📢'},
  {w:'spontaneous',es:'espontáneo / espontánea',ex:'\'I\'ll do it\' is a spontaneous decision — made right now.',s:'S2',t:'adj',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'⚡'},
  {w:'commitment',es:'compromiso',ex:'That\'s a commitment — I\'ll send it today.',s:'S2',t:'noun',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'🤝'},
  {w:'in my opinion',es:'en mi opinión',ex:'In my opinion, we should launch in July.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'💭'},
  {w:'I agree because',es:'Estoy de acuerdo porque',ex:'I agree because it reduces costs significantly.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'✅'},
  {w:'I see your point, but',es:'Entiendo tu punto, pero',ex:'I see your point, but I think it\'s too risky.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&auto=format&fit=crop',e:'🤔'},
  {w:'however',es:'sin embargo (formal)',ex:'It\'s a good plan. However, the timing is wrong.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'↩'},
  {w:'although',es:'aunque (formal)',ex:'Although it\'s expensive, I think it\'s worth it.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'↕'},
  {w:'because',es:'porque',ex:'I agree because it saves time and money.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'💡'},
  {w:'Sorry to interrupt',es:'Perdón por interrumpir / Con permiso',ex:'Sorry to interrupt — can I add something here?',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=400&auto=format&fit=crop',e:'✋'},
  {w:'Could you clarify?',es:'¿Podrías aclarar? / ¿Me puedes explicar?',ex:'Could you clarify what you mean by \'urgent\'?',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&auto=format&fit=crop',e:'❓'},
  {w:'Let\'s move on',es:'Continuemos / Pasemos al siguiente punto',ex:'Let\'s move on — we have two more items on the agenda.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'➡'},
  {w:'clearly',es:'claramente',ex:'Could you explain that more clearly, please?',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'💡'},
  {w:'efficiently',es:'eficientemente',ex:'She runs meetings very efficiently — always on time.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'⚡'},
  {w:'we\'re running over',es:'nos estamos pasando del tiempo',ex:'We\'re running over — let\'s wrap up quickly.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'⏰'},
  {w:'feedback',es:'retroalimentación / comentarios',ex:'My manager gave me very positive feedback today.',s:'S5',t:'noun',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'💬'},
  {w:'decision',es:'decisión',ex:'We need to make a decision today — no more delays.',s:'S5',t:'noun',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'⚖'},
  {w:'Are you going to?',es:'¿Vas a…? / ¿Van a…?',ex:'Are you going to attend the conference next week?',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'❓'},
  {w:'I\'ll sort it out',es:'Yo lo resuelvo / Yo lo arreglo',ex:'Don\'t worry about the problem — I\'ll sort it out.',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🔧'},
];
const typeLabels={noun:'Sust.',verb:'Verb.',phrase:'Frase',adj:'Adj.'};
const typeClasses={noun:'type-noun',verb:'type-verb',phrase:'type-phrase',adj:'type-adj'};
let filter='all',search='';
function buildCard(item,idx){
  return `<div class="card" id="c${idx}" data-s="${item.s}" data-w="${item.w.toLowerCase()}" data-es="${item.es.toLowerCase()}" onclick="toggle(${idx})">
    ${item.img?`<img class="card-img" src="${item.img}" alt="${item.w}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
    <div class="card-img-placeholder" style="display:${item.img?'none':'flex'}">${item.e||'📚'}</div>
    <div class="card-body">
      <span class="session-tag">${item.s} · A2.1 M1</span>
      <div class="card-top">
        <div class="word">${item.w}</div>
        <span class="type-badge ${typeClasses[item.t]}">${typeLabels[item.t]}</span>
      </div>
      <div class="spanish">(${item.es})</div>
      <div class="card-footer">
        <button class="speak-btn" id="sp${idx}" onclick="event.stopPropagation();speak(this.dataset.w,{idx})" data-w="${item.w}">🔊 Listen</button>
        <span class="flip-hint" id="hint${idx}">see example ▾</span>
      </div>
      <div class="example-wrap">
        <div class="example-label">Example</div>
        <div class="example">${item.ex}</div>
      </div>
    </div>
  </div>`;
}
function render(){
  const q=search.toLowerCase();
  const filtered=WORDS.filter(w=>{
    const ms=filter==='all'||w.s===filter;
    const mq=!q||w.w.toLowerCase().includes(q)||w.es.toLowerCase().includes(q);
    return ms&&mq;
  });
  document.getElementById('count').textContent=filtered.length;
  document.getElementById('noResults').style.display=filtered.length?'none':'block';
  document.getElementById('grid').innerHTML=filtered.map(w=>buildCard(w,WORDS.indexOf(w))).join('');
}
function toggle(idx){
  const c=document.getElementById('c'+idx);
  const h=document.getElementById('hint'+idx);
  if(!c)return;
  const open=c.classList.toggle('open');
  if(h)h.textContent=open?'close ▴':'see example ▾';
}
function spk(idx){
  const item=WORDS[idx];
  if(!item)return;
  const b=document.getElementById('sp'+idx);
  if(b){b.classList.add('playing');b.textContent='🔊 ...';}
  const audio=new Audio('https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q='+encodeURIComponent(item.w));
  audio.onended=()=>{if(b){b.classList.remove('playing');b.textContent='🔊 Listen';}};
  audio.onerror=()=>{if(b){b.classList.remove('playing');b.textContent='🔊 Listen';}};
  audio.play();
}
function speakWord(word,idx){spk(idx);}
function speak(w,idx){spk(idx);}
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterCards(){
  search=document.getElementById('search').value;
  render();
}
render();
</script>
</body>
</html>
