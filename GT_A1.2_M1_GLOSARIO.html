<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary A1.2 · M1 — Gabriel Turner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#A0206E;--dark:#1A2E45;--bg:#F7F5F0;--white:#fff;--gray:#7A8A9A;--light:#EDE8DD}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{max-width:960px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.htitle{flex:1;min-width:0}
.htitle h1{font-size:14px;font-weight:700;color:#fff}
.htitle p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.controls{max-width:960px;margin:0 auto;padding:16px 16px 0}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:11px 40px 11px 14px;border:2px solid var(--light);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--dark);outline:none;transition:border .2s;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--acc)}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.filter-btn{padding:6px 13px;border-radius:20px;border:2px solid var(--light);background:var(--white);color:var(--gray);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.stats{font-size:12px;color:var(--gray);padding:8px 0 14px}
.stats strong{color:var(--dark)}
.grid{max-width:960px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--light);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.98)}
.card-img{width:100%;height:110px;object-fit:cover;display:block;background:#EDE8DD}
.card-img-placeholder{width:100%;height:110px;background:linear-gradient(135deg,var(--dark) 0%,#2d4a6b 100%);display:none;align-items:center;justify-content:center;font-size:32px}
.card-body{padding:14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.word{font-size:18px;font-weight:700;color:var(--dark);line-height:1.2}
.type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:3px;flex-shrink:0}
.type-noun{background:#EBF3FF;color:#1A56A0}
.type-verb{background:#F0EBFC;color:#5B3FA0}
.type-phrase{background:#FEF8EE;color:#B85C0A}
.type-adj{background:#E3F5EC;color:#1A6B3C}
.spanish{font-size:13px;color:var(--gray);font-style:italic;margin-bottom:10px}
.session-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:8px;display:block}
.example-wrap{display:none;background:#F7F5F0;border-radius:8px;padding:10px 12px;margin-top:8px}
.example-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:4px}
.example{font-size:12px;color:var(--dark);line-height:1.6;font-style:italic}
.card.open .example-wrap{display:block}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.speak-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1.5px solid var(--light);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent}
.speak-btn.playing{background:var(--acc);border-color:var(--acc);color:#fff}
.flip-hint{font-size:10px;color:var(--gray)}
.card.open .flip-hint{color:var(--acc)}
.no-results{max-width:960px;margin:40px auto;padding:0 16px;text-align:center;color:var(--gray)}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 30px}
  .word{font-size:16px}
  .card-img,.card-img-placeholder{height:90px}
  .card-body{padding:10px}
  .speak-btn{padding:4px 9px;font-size:11px}
  .controls{padding:12px 12px 0}
  .filter-btn{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">GT</div>
    <div class="htitle">
      <h1>Glossary · A1.2 — M1</h1>
      <p>What Did You Do? · Pasado simple: acciones y eventos</p>
    </div>
    <span class="badge" id="badge-count">41 words</span>
  </div>
</div>
<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search in English or Spanish..." oninput="filterCards()" autocomplete="off" autocorrect="off" spellcheck="false">
    <span class="search-icon">🔍</span>
  </div>
  <div class="filters"><button class="filter-btn active" onclick="setFilter('all',this)">All</button><button class="filter-btn" onclick="setFilter('S1',this)">S1</button><button class="filter-btn" onclick="setFilter('S2',this)">S2</button><button class="filter-btn" onclick="setFilter('S3',this)">S3</button><button class="filter-btn" onclick="setFilter('S4',this)">S4</button><button class="filter-btn" onclick="setFilter('S5',this)">S5</button></div>
  <div class="stats"><strong id="count">41</strong> words · Tap a card to see an example sentence</div>
</div>
<div class="grid" id="grid"></div>
<div class="no-results" id="noResults" style="display:none"><p>No results found 🔍</p></div>
<script>
const WORDS=[
  {w:'report',es:'reporte / informe',ex:'I finished the report yesterday at 7pm.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'📄'},
  {w:'meeting',es:'reunión',ex:'We had a meeting on Monday morning.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'👥'},
  {w:'deadline',es:'fecha límite',ex:'The deadline was Friday. We made it!',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'⏰'},
  {w:'client',es:'cliente',ex:'I called the client three times yesterday.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'🤝'},
  {w:'presentation',es:'presentación',ex:'How was the presentation? — It went really well!',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&auto=format&fit=crop',e:'📊'},
  {w:'task',es:'tarea / actividad',ex:'I completed three tasks before lunch today.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'✅'},
  {w:'worked',es:'trabajé / trabajó (pasado de work)',ex:'I worked on the proposal all morning.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'💼'},
  {w:'finished',es:'terminé / terminó (pasado de finish)',ex:'We finished the project two hours early!',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1531545514256-b1400bc00f31?w=400&auto=format&fit=crop',e:'✅'},
  {w:'called',es:'llamé / llamó (pasado de call)',ex:'She called the client this morning at 9.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&auto=format&fit=crop',e:'📞'},
  {w:'attended',es:'asistí / asistió (pasado de attend)',ex:'Did you attend the meeting? — Yes, I attended.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'📋'},
  {w:'sent',es:'envié / envió (pasado de send)',ex:'I sent the email yesterday at 6pm.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1604580864964-0462f5d5b1a8?w=400&auto=format&fit=crop',e:'📧'},
  {w:'yesterday',es:'ayer',ex:'I worked on the report yesterday.',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'📅'},
  {w:'last week',es:'la semana pasada',ex:'Last week we finished the big project.',s:'S1',t:'phrase',img:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&auto=format&fit=crop',e:'📆'},
  {w:'went',es:'fui / fue (pasado de go)',ex:'I went to the client\'s office last Thursday.',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'🚗'},
  {w:'had',es:'tuve / tuvo (pasado de have)',ex:'We had a three-hour meeting on Monday.',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'📋'},
  {w:'made',es:'hice / hizo (pasado de make)',ex:'She made an excellent proposal last week.',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&auto=format&fit=crop',e:'💡'},
  {w:'got',es:'obtuve / obtuvo (pasado de get)',ex:'We got the contract after two months of work.',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🎉'},
  {w:'came',es:'vine / vino (pasado de come)',ex:'The client came to our factory for a visit.',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=400&auto=format&fit=crop',e:'🚶'},
  {w:'saw',es:'vi / vio (pasado de see)',ex:'I saw the results this morning — very positive!',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'👀'},
  {w:'took',es:'tomé / tomó (pasado de take)',ex:'The project took three weeks to complete.',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'⏱'},
  {w:'said',es:'dije / dijo (pasado de say)',ex:'She said the presentation was excellent.',s:'S2',t:'verb',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'💬'},
  {w:'contract',es:'contrato',ex:'We got the contract last week. Big celebration!',s:'S2',t:'noun',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'📝'},
  {w:'proposal',es:'propuesta',ex:'She made a great proposal to the new client.',s:'S2',t:'noun',img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&auto=format&fit=crop',e:'💡'},
  {w:'didn\'t finish',es:'no terminé / no terminó',ex:'I didn\'t finish the report — I ran out of time.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'❌'},
  {w:'didn\'t go',es:'no fui / no fue',ex:'She didn\'t go to the meeting. She was sick.',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1590650213165-c1fef80648c4?w=400&auto=format&fit=crop',e:'🚫'},
  {w:'Did you attend?',es:'¿Asististe? / ¿Fue usted?',ex:'Did you attend the conference last week?',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'❓'},
  {w:'How did it go?',es:'¿Cómo te fue? / ¿Cómo resultó?',ex:'How did the presentation go? — Really well!',s:'S3',t:'phrase',img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&auto=format&fit=crop',e:'🤔'},
  {w:'delay',es:'retraso / demora',ex:'There was a delay with the shipment last week.',s:'S3',t:'noun',img:'https://images.unsplash.com/photo-1590650046871-92c887180603?w=400&auto=format&fit=crop',e:'⏳'},
  {w:'problem',es:'problema',ex:'We had a problem with the delivery. Fixed now.',s:'S3',t:'noun',img:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&auto=format&fit=crop',e:'⚠'},
  {w:'reason',es:'razón / motivo',ex:'What was the reason for the delay?',s:'S3',t:'noun',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'🔍'},
  {w:'two days ago',es:'hace dos días',ex:'I sent the proposal two days ago.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'📅'},
  {w:'this morning',es:'esta mañana',ex:'I got an important email this morning.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'🌅'},
  {w:'first',es:'primero',ex:'First I attended the meeting. Then I wrote my notes.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=400&auto=format&fit=crop',e:'1️⃣'},
  {w:'then',es:'luego / después',ex:'First I prepared. Then I presented. Finally I answered questions.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'➡'},
  {w:'finally',es:'finalmente / al final',ex:'Finally, we reached an agreement with the client.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'🏁'},
  {w:'after that',es:'después de eso',ex:'After that, I wrote the meeting summary.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'⏭'},
  {w:'before',es:'antes (de)',ex:'I called the client before the meeting.',s:'S4',t:'phrase',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'⏮'},
  {w:'result',es:'resultado',ex:'The results were very positive this quarter.',s:'S5',t:'noun',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'📈'},
  {w:'it went well',es:'salió bien / resultó bien',ex:'How was the meeting? — It went really well!',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&auto=format&fit=crop',e:'✅'},
  {w:'we didn\'t have time',es:'no tuvimos tiempo',ex:'We didn\'t have time to finish the report.',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&auto=format&fit=crop',e:'⌛'},
  {w:'ago',es:'hace (tiempo)',ex:'I joined this company three years ago.',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&auto=format&fit=crop',e:'🕐'},
];
const typeLabels={noun:'Sust.',verb:'Verb.',phrase:'Frase',adj:'Adj.'};
const typeClasses={noun:'type-noun',verb:'type-verb',phrase:'type-phrase',adj:'type-adj'};
let filter='all',search='';
function buildCard(item,idx){
  return `<div class="card" id="c${idx}" data-s="${item.s}" data-w="${item.w.toLowerCase()}" data-es="${item.es.toLowerCase()}" onclick="toggle(${idx})">
    ${item.img?`<img class="card-img" src="${item.img}" alt="${item.w}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
    <div class="card-img-placeholder" style="display:${item.img?'none':'flex'}">${item.e||'📚'}</div>
    <div class="card-body">
      <span class="session-tag">${item.s} · A1.2 M1</span>
      <div class="card-top">
        <div class="word">${item.w}</div>
        <span class="type-badge ${typeClasses[item.t]}">${typeLabels[item.t]}</span>
      </div>
      <div class="spanish">(${item.es})</div>
      <div class="card-footer">
        <button class="speak-btn" id="sp${idx}" onclick="event.stopPropagation();speak(this.dataset.w,{idx})" data-w="${item.w}">🔊 Listen</button>
        <span class="flip-hint" id="hint${idx}">see example ▾</span>
      </div>
      <div class="example-wrap">
        <div class="example-label">Example</div>
        <div class="example">${item.ex}</div>
      </div>
    </div>
  </div>`;
}
function render(){
  const q=search.toLowerCase();
  const filtered=WORDS.filter(w=>{
    const ms=filter==='all'||w.s===filter;
    const mq=!q||w.w.toLowerCase().includes(q)||w.es.toLowerCase().includes(q);
    return ms&&mq;
  });
  document.getElementById('count').textContent=filtered.length;
  document.getElementById('noResults').style.display=filtered.length?'none':'block';
  document.getElementById('grid').innerHTML=filtered.map(w=>buildCard(w,WORDS.indexOf(w))).join('');
}
function toggle(idx){
  const c=document.getElementById('c'+idx);
  const h=document.getElementById('hint'+idx);
  if(!c)return;
  const open=c.classList.toggle('open');
  if(h)h.textContent=open?'close ▴':'see example ▾';
}
function spk(idx){
  const item=WORDS[idx];
  if(!item)return;
  const b=document.getElementById('sp'+idx);
  if(b){b.classList.add('playing');b.textContent='🔊 ...';}
  const audio=new Audio('https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q='+encodeURIComponent(item.w));
  audio.onended=()=>{if(b){b.classList.remove('playing');b.textContent='🔊 Listen';}};
  audio.onerror=()=>{if(b){b.classList.remove('playing');b.textContent='🔊 Listen';}};
  audio.play();
}
function speakWord(word,idx){spk(idx);}
function speak(w,idx){spk(idx);}
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterCards(){
  search=document.getElementById('search').value;
  render();
}
render();
</script>
</body>
</html>
