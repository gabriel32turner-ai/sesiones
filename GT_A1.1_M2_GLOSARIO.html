<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary A1.1 · M2 — Gabriel Turner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#C9922A;--dark:#1A2E45;--bg:#F7F5F0;--white:#fff;--gray:#7A8A9A;--light:#EDE8DD}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{max-width:960px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.htitle{flex:1;min-width:0}
.htitle h1{font-size:14px;font-weight:700;color:#fff}
.htitle p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.controls{max-width:960px;margin:0 auto;padding:16px 16px 0}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:11px 40px 11px 14px;border:2px solid var(--light);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--dark);outline:none;transition:border .2s;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--acc)}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.filter-btn{padding:6px 13px;border-radius:20px;border:2px solid var(--light);background:var(--white);color:var(--gray);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.stats{font-size:12px;color:var(--gray);padding:8px 0 14px}
.stats strong{color:var(--dark)}
.grid{max-width:960px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--light);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.98)}
.card-img{width:100%;height:110px;object-fit:cover;display:block;background:#EDE8DD}
.card-img-placeholder{width:100%;height:110px;background:linear-gradient(135deg,var(--dark) 0%,#2d4a6b 100%);display:none;align-items:center;justify-content:center;font-size:32px}
.card-body{padding:14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.word{font-size:18px;font-weight:700;color:var(--dark);line-height:1.2}
.type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:3px;flex-shrink:0}
.type-noun{background:#EBF3FF;color:#1A56A0}
.type-verb{background:#F0EBFC;color:#5B3FA0}
.type-phrase{background:#FEF8EE;color:#B85C0A}
.type-adj{background:#E3F5EC;color:#1A6B3C}
.spanish{font-size:13px;color:var(--gray);font-style:italic;margin-bottom:10px}
.session-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:8px;display:block}
.example-wrap{display:none;background:#F7F5F0;border-radius:8px;padding:10px 12px;margin-top:8px}
.example-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:4px}
.example{font-size:12px;color:var(--dark);line-height:1.6;font-style:italic}
.card.open .example-wrap{display:block}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.speak-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1.5px solid var(--light);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent}
.speak-btn.playing{background:var(--acc);border-color:var(--acc);color:#fff}
.flip-hint{font-size:10px;color:var(--gray)}
.card.open .flip-hint{color:var(--acc)}
.no-results{max-width:960px;margin:40px auto;padding:0 16px;text-align:center;color:var(--gray)}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 30px}
  .word{font-size:16px}
  .card-img,.card-img-placeholder{height:90px}
  .card-body{padding:10px}
  .speak-btn{padding:4px 9px;font-size:11px}
  .controls{padding:12px 12px 0}
  .filter-btn{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">GT</div>
    <div class="htitle">
      <h1>Glossary · A1.1 — M2</h1>
      <p>My World · Entorno personal y laboral</p>
    </div>
    <span class="badge" id="badge-count">46 words</span>
  </div>
</div>
<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search in English or Spanish..." oninput="filterCards()" autocomplete="off" autocorrect="off" spellcheck="false">
    <span class="search-icon">🔍</span>
  </div>
  <div class="filters"><button class="filter-btn active" onclick="setFilter('all',this)">All</button><button class="filter-btn" onclick="setFilter('S1',this)">S1</button><button class="filter-btn" onclick="setFilter('S2',this)">S2</button><button class="filter-btn" onclick="setFilter('S3',this)">S3</button><button class="filter-btn" onclick="setFilter('S4',this)">S4</button><button class="filter-btn" onclick="setFilter('S5',this)">S5</button></div>
  <div class="stats"><strong id="count">46</strong> words · Tap a card to see an example sentence</div>
</div>
<div class="grid" id="grid"></div>
<div class="no-results" id="noResults" style="display:none"><p>No results found 🔍</p></div>
<script>
const WORDS=[
  {w:'desk',es:'escritorio',ex:'My desk is near the window. I love it.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&auto=format&fit=crop',e:'🖥'},
  {w:'chair',es:'silla',ex:'My chair is very comfortable — good for long days.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1505843490701-f2e456f6b4e2?w=400&auto=format&fit=crop',e:'🪑'},
  {w:'screen',es:'pantalla / monitor',ex:'I have two screens on my desk. Very useful.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1593642634315-48f5414c3ad9?w=400&auto=format&fit=crop',e:'🖥'},
  {w:'keyboard',es:'teclado',ex:'My keyboard is wireless. I love it.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&auto=format&fit=crop',e:'⌨'},
  {w:'printer',es:'impresora',ex:'The printer is in the copy room on the second floor.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=400&auto=format&fit=crop',e:'🖨'},
  {w:'building',es:'edificio',ex:'Our building has five floors and a parking lot.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&auto=format&fit=crop',e:'🏢'},
  {w:'meeting room',es:'sala de juntas',ex:'The meeting room is on the third floor.',s:'S1',t:'noun',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'🏛'},
  {w:'my',es:'mi / mis (posesivo)',ex:'My desk is very organized. My team is great.',s:'S1',t:'adj',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'👤'},
  {w:'your',es:'tu / tus / su / sus',ex:'What\'s your desk like? Is your office big?',s:'S1',t:'adj',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'👤'},
  {w:'his / her',es:'su (de él / de ella)',ex:'His desk is messy. Her office is very tidy.',s:'S1',t:'adj',img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&auto=format&fit=crop',e:'👥'},
  {w:'our',es:'nuestro / nuestra',ex:'Our office is on the second floor of the building.',s:'S1',t:'adj',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'🏢'},
  {w:'their',es:'su / sus (de ellos/ellas)',ex:'Their team is very big — 30 people!',s:'S1',t:'adj',img:'https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=400&auto=format&fit=crop',e:'👥'},
  {w:'use',es:'usar / utilizar',ex:'I use my laptop for all my work. Do you use a Mac?',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'💻'},
  {w:'share',es:'compartir',ex:'I share my office with two colleagues.',s:'S1',t:'verb',img:'https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=400&auto=format&fit=crop',e:'🤝'},
  {w:'on',es:'en / sobre (encima de)',ex:'The report is on my desk. The printer is on the table.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&auto=format&fit=crop',e:'📋'},
  {w:'in',es:'en / dentro de',ex:'The files are in the drawer. My keys are in my bag.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'📁'},
  {w:'under',es:'debajo de',ex:'The cables are under the desk. My bag is under the chair.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1505843490701-f2e456f6b4e2?w=400&auto=format&fit=crop',e:'⬇'},
  {w:'next to',es:'al lado de',ex:'My printer is next to my screen. She sits next to me.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'↔'},
  {w:'in front of',es:'enfrente de / delante de',ex:'There is a chair in front of my desk.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1573497491765-dccce02b29df?w=400&auto=format&fit=crop',e:'⬆'},
  {w:'behind',es:'detrás de',ex:'The window is behind my desk. Good for light!',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&auto=format&fit=crop',e:'🔙'},
  {w:'there is',es:'hay (singular)',ex:'There is a printer on the second floor.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=400&auto=format&fit=crop',e:'1️⃣'},
  {w:'there are',es:'hay (plural)',ex:'There are three meeting rooms in our office.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'3️⃣'},
  {w:'between',es:'entre (dos cosas)',ex:'My desk is between the window and the door.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&auto=format&fit=crop',e:'↔'},
  {w:'near',es:'cerca de',ex:'The coffee machine is near the kitchen area.',s:'S2',t:'phrase',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'📍'},
  {w:'this',es:'este / esta (cerca, singular)',ex:'This is my desk. This keyboard is new.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&auto=format&fit=crop',e:'👆'},
  {w:'that',es:'ese / esa / aquel / aquella (lejos, singular)',ex:'That is Ana\'s desk. That printer is broken.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=400&auto=format&fit=crop',e:'👉'},
  {w:'these',es:'estos / estas (cerca, plural)',ex:'These are my files. These chairs are very old.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&auto=format&fit=crop',e:'👆'},
  {w:'those',es:'esos / esas (lejos, plural)',ex:'Those are the meeting rooms. Those screens are new.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'👉'},
  {w:'big',es:'grande',ex:'My office is very big. We have a big team.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&auto=format&fit=crop',e:'📐'},
  {w:'small',es:'pequeño / pequeña',ex:'My desk is small but my screen is big!',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&auto=format&fit=crop',e:'📏'},
  {w:'modern',es:'moderno / moderna',ex:'Our office is very modern — open space design.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'✨'},
  {w:'comfortable',es:'cómodo / cómoda',ex:'My chair is very comfortable. I love it.',s:'S3',t:'adj',img:'https://images.unsplash.com/photo-1505843490701-f2e456f6b4e2?w=400&auto=format&fit=crop',e:'😊'},
  {w:'drawer',es:'cajón',ex:'My keys are in the top drawer of my desk.',s:'S4',t:'noun',img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc86b40?w=400&auto=format&fit=crop',e:'🗄'},
  {w:'shelf',es:'estante',ex:'The files are on the shelf behind the door.',s:'S4',t:'noun',img:'https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=400&auto=format&fit=crop',e:'📚'},
  {w:'notice board',es:'tablero de avisos',ex:'Check the notice board for the new schedule.',s:'S4',t:'noun',img:'https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=400&auto=format&fit=crop',e:'📌'},
  {w:'equipment',es:'equipo / equipamiento',ex:'All the equipment is on the second floor.',s:'S4',t:'noun',img:'https://images.unsplash.com/photo-1593642634315-48f5414c3ad9?w=400&auto=format&fit=crop',e:'🔧'},
  {w:'organize',es:'organizar',ex:'I organize my desk every Monday morning.',s:'S4',t:'verb',img:'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&auto=format&fit=crop',e:'📋'},
  {w:'borrow',es:'pedir prestado',ex:'Can I borrow your charger? Mine is broken.',s:'S4',t:'verb',img:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&auto=format&fit=crop',e:'🤲'},
  {w:'fix',es:'arreglar / reparar',ex:'The printer is broken. Can you fix it?',s:'S4',t:'verb',img:'https://images.unsplash.com/photo-1580894894513-541e068a3e2b?w=400&auto=format&fit=crop',e:'🔧'},
  {w:'chairs',es:'sillas (plural)',ex:'There are ten chairs in the meeting room.',s:'S4',t:'noun',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&auto=format&fit=crop',e:'🪑'},
  {w:'office',es:'oficina',ex:'My office is on the third floor of the building.',s:'S5',t:'noun',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'🏢'},
  {w:'workspace',es:'espacio de trabajo',ex:'My workspace is very organized and comfortable.',s:'S5',t:'noun',img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&auto=format&fit=crop',e:'💼'},
  {w:'laptop',es:'laptop / computadora portátil',ex:'I work with a laptop. I use it everywhere.',s:'S5',t:'noun',img:'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&auto=format&fit=crop',e:'💻'},
  {w:'tidy',es:'ordenado / ordenada',ex:'Is your desk tidy or messy? Mine is very tidy!',s:'S5',t:'adj',img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&auto=format&fit=crop',e:'✅'},
  {w:'open space',es:'espacio abierto (oficina sin cubículos)',ex:'Our company has an open space — no private offices.',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&auto=format&fit=crop',e:'🏢'},
  {w:'There is a … in the …',es:'Hay un/una … en el/la …',ex:'There is a printer in the copy room on floor 2.',s:'S5',t:'phrase',img:'https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=400&auto=format&fit=crop',e:'📋'},
];
const typeLabels={noun:'Sust.',verb:'Verb.',phrase:'Frase',adj:'Adj.'};
const typeClasses={noun:'type-noun',verb:'type-verb',phrase:'type-phrase',adj:'type-adj'};
let filter='all',search='';
function buildCard(item,idx){
  return `<div class="card" id="c${idx}" data-s="${item.s}" data-w="${item.w.toLowerCase()}" data-es="${item.es.toLowerCase()}" onclick="toggle(${idx})">
    ${item.img?`<img class="card-img" src="${item.img}" alt="${item.w}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
    <div class="card-img-placeholder" style="display:${item.img?'none':'flex'}">${item.e||'📚'}</div>
    <div class="card-body">
      <span class="session-tag">${item.s} · A1.1 M2</span>
      <div class="card-top">
        <div class="word">${item.w}</div>
        <span class="type-badge ${typeClasses[item.t]}">${typeLabels[item.t]}</span>
      </div>
      <div class="spanish">(${item.es})</div>
      <div class="card-footer">
        <button class="speak-btn" id="sp${idx}" onclick="event.stopPropagation();speak('${item.w.replace(/'/g,"\'")}',\\`${idx}\\`)">🔊 Listen</button>
        <span class="flip-hint" id="hint${idx}">see example ▾</span>
      </div>
      <div class="example-wrap">
        <div class="example-label">Example</div>
        <div class="example">${item.ex}</div>
      </div>
    </div>
  </div>`;
}
function render(){
  const q=search.toLowerCase();
  const filtered=WORDS.filter(w=>{
    const ms=filter==='all'||w.s===filter;
    const mq=!q||w.w.toLowerCase().includes(q)||w.es.toLowerCase().includes(q);
    return ms&&mq;
  });
  document.getElementById('count').textContent=filtered.length;
  document.getElementById('noResults').style.display=filtered.length?'none':'block';
  document.getElementById('grid').innerHTML=filtered.map(w=>buildCard(w,WORDS.indexOf(w))).join('');
}
function toggle(idx){
  const c=document.getElementById('c'+idx);
  const h=document.getElementById('hint'+idx);
  if(!c)return;
  const open=c.classList.toggle('open');
  if(h)h.textContent=open?'close ▴':'see example ▾';
}
function speak(w,idx){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  u.lang='en-US';u.rate=0.82;
  const b=document.getElementById('sp'+idx);
  if(b){b.classList.add('playing');b.textContent='🔊 ...';}
  u.onend=()=>{if(b){b.classList.remove('playing');b.textContent='🔊 Listen';}};
  window.speechSynthesis.speak(u);
}
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterCards(){
  search=document.getElementById('search').value;
  render();
}
render();
</script>
</body>
</html>
